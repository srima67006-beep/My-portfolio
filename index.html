<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>My Portfolio</title>

<style>
body {
    font-family: Arial;
    margin: 0;
    padding: 0;
}

header {
    background: #333;
    color: white;
    padding: 15px;
    text-align: center;
}

nav a {
    color: white;
    margin: 10px;
    text-decoration: none;
}

nav a:hover {
    text-decoration: underline;
}

section {
    padding: 20px;
}

h2 {
    color: #333;
}

.project {
    background: #f4f4f4;
    padding: 10px;
    margin: 10px 0;
    border-radius: 5px;
}

button {
    background: blue;
    color: white;
    padding: 10px;
    border: none;
    cursor: pointer;
}

button:hover {
    background: darkblue;
}

footer {
    text-align: center;
    background: #333;
    color: white;
    padding: 10px;
}
</style>

</head>
<body>

<header>
    <h1>My Portfolio</h1>
    <nav>
        <a href="#about">About</a>
        <a href="#skills">Skills</a>
        <a href="#projects">Projects</a>
        <a href="#contact">Contact</a>
    </nav>
</header>

<section id="about">
    <h2>About Me</h2>
    <p>Hello! I am srimathi. I love coding and learning new technologies.</p>
</section>

<section id="skills">
    <h2>Skills</h2>
    <ul>
        <li>HTML</li>
        <li>CSS</li>
        <li>JavaScript</li>
    </ul>
</section>

<section id="projects">
    <h2>Projects</h2>
    <div class="project">
        <h3>Portfolio Website</h3>
        <p>This is my personal portfolio project.</p>
    </div>
</section>

<section id="contact">
    <h2>Contact Me</h2>
    <form onsubmit="return showMessage()">
        <input type="text" placeholder="Your Name" required><br><br>
        <input type="email" placeholder="Your Email" required><br><br>
        <textarea placeholder="Your Message"></textarea><br><br>
        <button type="submit">Send</button>
    </form>
</section>

<footer>
    <p>© 2026 My Portfolio</p>
</footer>

<script>
function showMessage() {
    alert("Message sent successfully!");
    return false;
}
</script>

</body>
</html>
